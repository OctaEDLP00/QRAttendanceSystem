services:
  postgres:
    image: postgres
    container_name: qr-attendance-postgres
    environment:
      POSTGRES_DB: qr_attendance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qr-attendance-network
    restart: unless-stopped

  backend:
    build:
      context: . # Sube el contexto a la raíz del monorepo
      dockerfile: ./backend/Dockerfile
    container_name: qr-attendance-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/qr_attendance
      NODE_ENV: development
    depends_on:
      - postgres
    networks:
      - qr-attendance-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: . # Sube el contexto a la raíz del monorepo
      dockerfile: ./frontend/Dockerfile
    container_name: qr-attendance-frontend
    ports:
      - "4321:4321"
    networks:
      - qr-attendance-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  qr-attendance-network:
    driver: bridge
